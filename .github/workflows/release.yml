name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
            arch: "arm64"
          - platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
            arch: "x64"
          - platform: "ubuntu-22.04"
            args: ""
            target: ""
            arch: "x64"
          - platform: "windows-latest"
            args: ""
            target: ""
            arch: "x64"

    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update version in config files
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          
          # Use sed -i '' for macOS, sed -i for Linux/Windows
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
            sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          else
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
            sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json
          fi
          
          echo "Updated version to $VERSION"
        shell: bash

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      # Get latest mihomo release version (Added GITHUB_TOKEN to prevent API Rate Limit)
      - name: Get latest mihomo version
        id: mihomo_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MIHOMO_VERSION=$(curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "VERSION=$MIHOMO_VERSION" >> $GITHUB_OUTPUT
          echo "Latest mihomo version: $MIHOMO_VERSION"
        shell: bash

      # Download mihomo core for full version (Fixed extracted filename)
      - name: Download mihomo core (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p src-tauri/bundled
          MIHOMO_VERSION=${{ steps.mihomo_version.outputs.VERSION }}
          curl -L -o mihomo.zip "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-windows-amd64-compatible-${MIHOMO_VERSION}.zip"
          unzip mihomo.zip
          mv mihomo-windows-amd64-compatible.exe src-tauri/bundled/mihomo.exe
          rm mihomo.zip
        shell: bash

      - name: Download mihomo core (macOS arm64)
        if: matrix.platform == 'macos-latest' && matrix.arch == 'arm64'
        run: |
          mkdir -p src-tauri/bundled
          MIHOMO_VERSION=${{ steps.mihomo_version.outputs.VERSION }}
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-darwin-arm64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          mv mihomo src-tauri/bundled/mihomo
        shell: bash

      - name: Download mihomo core (macOS x64)
        if: matrix.platform == 'macos-latest' && matrix.arch == 'x64'
        run: |
          mkdir -p src-tauri/bundled
          MIHOMO_VERSION=${{ steps.mihomo_version.outputs.VERSION }}
          # 加上 -compatible
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-darwin-amd64-compatible-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          mv mihomo src-tauri/bundled/mihomo
        shell: bash

      - name: Download mihomo core (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/bundled
          MIHOMO_VERSION=${{ steps.mihomo_version.outputs.VERSION }}
          # 加上 -compatible
          curl -L -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-compatible-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          mv mihomo src-tauri/bundled/mihomo
        shell: bash

      # Download geo data files for full version
      - name: Download geo data files
        run: |
          mkdir -p src-tauri/bundled
          curl -L -o src-tauri/bundled/geoip.dat "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geoip.dat"
          curl -L -o src-tauri/bundled/geosite.dat "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geosite.dat"
          curl -L -o src-tauri/bundled/Country.mmdb "https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/country.mmdb"
        shell: bash

      # Build full version (with bundled core and geo)
# 0. 准备存放所有产物的保险柜文件夹
      - name: Create artifacts directory
        run: mkdir -p dist-artifacts
        shell: bash

      # 1. 编译 Full 版本
      - name: Build Tauri app (Full)
        run: npx tauri build ${{ matrix.args }}

      # 2. 收集 Full 版本的安装包到保险柜
      - name: Collect Windows Full artifacts
        if: matrix.platform == 'windows-latest'
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/nsis/*-setup.exe; do
            cp "$f" "dist-artifacts/$(basename "${f/-setup/-setup-full}")"
          done
          for f in src-tauri/target/release/bundle/msi/*.msi; do
            cp "$f" "dist-artifacts/$(basename "${f/.msi/-full.msi}")"
          done
        shell: bash

      - name: Collect macOS Full artifacts
        if: matrix.platform == 'macos-latest'
        run: |
          shopt -s nullglob
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            cp "$f" "dist-artifacts/$(basename "${f/.dmg/-full.dmg}")"
          done
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz; do
            cp "$f" "dist-artifacts/$(basename "${f/.tar.gz/-full.tar.gz}")"
          done
        shell: bash

      - name: Collect Linux Full artifacts
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            cp "$f" "dist-artifacts/$(basename "${f/.deb/-full.deb}")"
          done
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            cp "$f" "dist-artifacts/$(basename "${f/.AppImage/-full.AppImage}")"
          done
          for f in src-tauri/target/release/bundle/rpm/*.rpm; do
            cp "$f" "dist-artifacts/$(basename "${f/.rpm/-full.rpm}")"
          done
        shell: bash

      # 3. 删除内置内核与Geo文件，准备编译 Lite 版
      - name: Remove bundled files for lite version
        run: |
          rm -rf src-tauri/bundled/*
        shell: bash

      # 4. 编译 Lite 版本 (此时Tauri清理旧文件夹也不会影响我们已经拷走的文件了)
      - name: Build Tauri app (Lite)
        run: npx tauri build ${{ matrix.args }}

      # 5. 收集 Lite 版本的安装包到保险柜
      - name: Collect Windows Lite artifacts
        if: matrix.platform == 'windows-latest'
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/nsis/*-setup.exe; do
            cp "$f" "dist-artifacts/$(basename "${f/-setup/-setup-lite}")"
          done
          for f in src-tauri/target/release/bundle/msi/*.msi; do
            cp "$f" "dist-artifacts/$(basename "${f/.msi/-lite.msi}")"
          done
        shell: bash

      - name: Collect macOS Lite artifacts
        if: matrix.platform == 'macos-latest'
        run: |
          shopt -s nullglob
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg; do
            cp "$f" "dist-artifacts/$(basename "${f/.dmg/-lite.dmg}")"
          done
          for f in src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz; do
            cp "$f" "dist-artifacts/$(basename "${f/.tar.gz/-lite.tar.gz}")"
          done
        shell: bash

      - name: Collect Linux Lite artifacts
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          shopt -s nullglob
          for f in src-tauri/target/release/bundle/deb/*.deb; do
            cp "$f" "dist-artifacts/$(basename "${f/.deb/-lite.deb}")"
          done
          for f in src-tauri/target/release/bundle/appimage/*.AppImage; do
            cp "$f" "dist-artifacts/$(basename "${f/.AppImage/-lite.AppImage}")"
          done
          for f in src-tauri/target/release/bundle/rpm/*.rpm; do
            cp "$f" "dist-artifacts/$(basename "${f/.rpm/-lite.rpm}")"
          done
        shell: bash

      # 6. 一键清空购物车！上传保险柜里的所有文件到 GitHub Release
      - name: Upload All Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: "Zephyr ${{ github.ref_name }}"
          body: "See the assets to download and install this version."
          draft: true
          prerelease: false
          files: dist-artifacts/*